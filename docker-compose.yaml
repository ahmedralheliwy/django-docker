services:
  web:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/static
    env_file:
      - .env
    depends_on: 
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf 
      - static_volume:/app/static
    depends_on:
      - web

  redis:
    image: redis:alpine

  celery:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
       
volumes:
    postgres_data:
    static_volume:


